# Production profile - activate with: --spring.profiles.active=prod,postgresql

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lisory}
spring.datasource.username=${DB_USERNAME:lisory}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.sql.init.mode=never

# JWT - must be set via environment variable in production
jwt.secret=${JWT_SECRET}

# CORS - production frontend URL
app.cors.allowed-origins=https://lisory.com.br

# Melhor Envio - production URLs
melhor-envio.api-url=https://api.melhorenvio.com.br
melhor-envio.callback-url=https://api.lisory.com.br/api/integrations/melhor-envio/oauth/callback

# InfinitePay - production URLs
infinitepay.redirect-url=https://lisory.com.br/checkout/success
infinitepay.webhook-url=https://api.lisory.com.br/webhooks/infinitepay

# Flyway
spring.flyway.enabled=false
