# ============================
# Production Profile
# Activate: --spring.profiles.active=prod
# ============================

# PostgreSQL - all values from env vars
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 disabled
spring.h2.console.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}

# CORS
app.cors.allowed-origins=https://lisory.com.br,https://www.lisory.com.br

# Melhor Envio - production
melhor-envio.api-url=https://api.melhorenvio.com.br
melhor-envio.callback-url=https://api.lisory.com.br/api/integrations/melhor-envio/oauth/callback

# InfinitePay - production
infinitepay.redirect-url=https://lisory.com.br/checkout/success
infinitepay.webhook-url=https://api.lisory.com.br/webhooks/infinitepay

# Logging
logging.level.root=INFO
logging.level.com.lisory.backend=INFO
