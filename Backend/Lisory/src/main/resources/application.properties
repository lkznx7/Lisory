spring.application.name=Lisory

server.port=8080

# Forward headers for Nginx reverse proxy
server.forward-headers-strategy=framework

# Default: H2 Database (DEV profile)
spring.datasource.url=${DB_URL:jdbc:h2:mem:lisory;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.sql.init.mode=never

# Flyway
spring.flyway.enabled=false

# JWT
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min-32-chars!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Rate Limiting
rate-limit.login.max-attempts=${RATE_LIMIT_LOGIN_MAX:5}
rate-limit.login.duration-minutes=${RATE_LIMIT_LOGIN_DURATION:15}
rate-limit.register.max-attempts=${RATE_LIMIT_REGISTER_MAX:3}
rate-limit.register.duration-minutes=${RATE_LIMIT_REGISTER_DURATION:60}

# Melhor Envio
melhor-envio.client-id=${MELHOR_ENVIO_CLIENT_ID:}
melhor-envio.client-secret=${MELHOR_ENVIO_CLIENT_SECRET:}
melhor-envio.api-url=${MELHOR_ENVIO_API_URL:https://sandbox.melhorenvio.com.br}
melhor-envio.user-agent=${MELHOR_ENVIO_USER_AGENT:Lisory (contato@lisory.com.br)}
melhor-envio.callback-url=${MELHOR_ENVIO_CALLBACK_URL:http://localhost:8080/api/integrations/melhor-envio/oauth/callback}
melhor-envio.scopes=${MELHOR_ENVIO_SCOPES:cart-read cart-write orders-read shipping-calculate shipping-cancel shipping-checkout shipping-companies shipping-generate shipping-preview shipping-print shipping-share shipping-tracking}

# InfinitePay
infinitepay.handle=${INFINITEPAY_HANDLE:}
infinitepay.checkout-api-url=${INFINITEPAY_CHECKOUT_API_URL:https://api.checkout.infinitepay.io}
infinitepay.webhook-secret=${INFINITEPAY_WEBHOOK_SECRET:}
infinitepay.redirect-url=${INFINITEPAY_REDIRECT_URL:http://localhost:3000/checkout/success}
infinitepay.webhook-url=${INFINITEPAY_WEBHOOK_URL:http://localhost:8080/webhooks/infinitepay}
infinitepay.client-id=${INFINITEPAY_CLIENT_ID:}

# Security headers
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
