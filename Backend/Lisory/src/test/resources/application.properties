# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:lisory_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.flyway.enabled=false

spring.h2.console.enabled=false

jwt.secret=test-secret-for-unit-tests-only-min-32-chars!!
jwt.expiration=86400000

app.cors.allowed-origins=http://localhost:3000

data.initializer.enabled=false
