version: "3.9"

services:
  # ============================
  # PostgreSQL
  # ============================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lisory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lisory"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================
  # Backend — Spring Boot
  # ============================
  backend:
    build:
      context: ./Backend/Lisory
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lisory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # JWT
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://lisory.com.br}
      # Melhor Envio
      MELHOR_ENVIO_CLIENT_ID: ${MELHOR_ENVIO_CLIENT_ID:-26942}
      MELHOR_ENVIO_CLIENT_SECRET: ${MELHOR_ENVIO_CLIENT_SECRET:-}
      MELHOR_ENVIO_API_URL: ${MELHOR_ENVIO_API_URL:-https://api.melhorenvio.com.br}
      MELHOR_ENVIO_USER_AGENT: "Lisory (contato@lisory.com.br)"
      MELHOR_ENVIO_CALLBACK_URL: ${MELHOR_ENVIO_CALLBACK_URL:-https://lisory.com.br/api/integrations/melhor-envio/oauth/callback}
      MELHOR_ENVIO_SCOPES: ${MELHOR_ENVIO_SCOPES:-cart-read cart-write orders-read shipping-calculate shipping-cancel shipping-checkout shipping-companies shipping-generate shipping-preview shipping-print shipping-share shipping-tracking}
      MELHOR_ENVIO_ORIGIN_CEP: ${MELHOR_ENVIO_ORIGIN_CEP:-01310-100}
      # Asaas (sandbox: https://sandbox.asaas.com/api/v3, production: https://api.asaas.com/api/v3)
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_API_URL: ${ASAAS_API_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_REDIRECT_URL: ${ASAAS_REDIRECT_URL:-https://lisory.com.br/confirmation}

  # ============================
  # Frontend — Next.js
  # ============================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lisory.com.br}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production

volumes:
  pgdata:
