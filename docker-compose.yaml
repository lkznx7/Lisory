version: "3.9"

services:
  # ============================
  # PostgreSQL
  # ============================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lisory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lisory"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================
  # Backend — Spring Boot
  # ============================
  backend:
    build:
      context: ./Backend/Lisory
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_URL: jdbc:postgresql://db:5432/lisory
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      H2_CONSOLE_ENABLED: "false"
      # JWT
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://lisory.com.br}
      # Melhor Envio
      MELHOR_ENVIO_CLIENT_ID: ${MELHOR_ENVIO_CLIENT_ID:-26942}
      MELHOR_ENVIO_CLIENT_SECRET: ${MELHOR_ENVIO_CLIENT_SECRET:-}
      MELHOR_ENVIO_API_URL: ${MELHOR_ENVIO_API_URL:-https://melhorenvio.com.br}
      MELHOR_ENVIO_USER_AGENT: "Lisory (contato@lisory.com.br)"
      MELHOR_ENVIO_CALLBACK_URL: ${MELHOR_ENVIO_CALLBACK_URL:-https://lisory.com.br/api/integrations/melhor-envio/oauth/callback}
      MELHOR_ENVIO_SCOPES: ${MELHOR_ENVIO_SCOPES:-cart-read cart-write orders-read shipping-calculate shipping-cancel shipping-checkout shipping-companies shipping-generate shipping-preview shipping-print shipping-share shipping-tracking}
      # InfinitePay
      INFINITEPAY_HANDLE: ${INFINITEPAY_HANDLE:-}
      INFINITEPAY_CHECKOUT_API_URL: ${INFINITEPAY_CHECKOUT_API_URL:-https://api.checkout.infinitepay.io}
      INFINITEPAY_WEBHOOK_SECRET: ${INFINITEPAY_WEBHOOK_SECRET:-}
      INFINITEPAY_REDIRECT_URL: ${INFINITEPAY_REDIRECT_URL:-https://lisory.com.br/checkout/success}
      INFINITEPAY_WEBHOOK_URL: ${INFINITEPAY_WEBHOOK_URL:-https://lisory.com.br/webhooks/infinitepay}
      INFINITEPAY_CLIENT_ID: ${INFINITEPAY_CLIENT_ID:-}

  # ============================
  # Frontend — Next.js
  # ============================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lisory.com.br}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  pgdata:
