# PostgreSQL profile - activate with: --spring.profiles.active=postgresql
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/Lisory}
spring.datasource.username=${DATABASE_USERNAME:Lisory}
spring.datasource.password=${DATABASE_PASSWORD:LisoryTest}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.sql.init.mode=never
